<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="jar-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1815" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d0c0a" stop-opacity="0.95"/>
    </linearGradient>
    <clipPath id="jar-clip">
      <rect x="50" y="95" width="100" height="120" rx="12"/>
    </clipPath>
  </defs>

  <!-- Jar neck -->
  <rect x="70" y="85" width="60" height="14" rx="3" fill="#2a2520" stroke="#3d3830" stroke-width="1.5"/>
  <rect x="75" y="82" width="50" height="6" rx="2" fill="#3d3830"/>

  <!-- Jar body -->
  <rect x="50" y="95" width="100" height="120" rx="12" fill="url(#jar-bg)" stroke="#2e2a25" stroke-width="1.5"/>

  <!-- Circuit board inside -->
  <g clip-path="url(#jar-clip)" filter="url(#glow)">
    <line x1="100" y1="105" x2="100" y2="205" stroke="#e76f51" stroke-width="1.8" opacity="0.7"/>
    <line x1="65" y1="130" x2="135" y2="130" stroke="#f4a261" stroke-width="1.2" opacity="0.5"/>
    <line x1="70" y1="155" x2="130" y2="155" stroke="#f4a261" stroke-width="1.2" opacity="0.5"/>
    <line x1="68" y1="180" x2="132" y2="180" stroke="#f4a261" stroke-width="1.2" opacity="0.5"/>
    <path d="M 85 120 Q 115 120, 115 135 Q 115 150, 85 150 Q 55 150, 85 165 Q 115 165, 115 180 Q 115 195, 85 195"
          stroke="#e76f51" stroke-width="2.5" fill="none" opacity="0.9" stroke-linecap="round"/>
    <circle cx="100" cy="130" r="3" fill="#e76f51" opacity="0.8"/>
    <circle cx="100" cy="155" r="3" fill="#f4a261" opacity="0.8"/>
    <circle cx="100" cy="180" r="3" fill="#e76f51" opacity="0.8"/>
    <circle cx="75" cy="130" r="2" fill="#f4a261" opacity="0.6"/>
    <circle cx="125" cy="130" r="2" fill="#f4a261" opacity="0.6"/>
    <circle cx="75" cy="155" r="2" fill="#e9c46a" opacity="0.6"/>
    <circle cx="125" cy="155" r="2" fill="#e9c46a" opacity="0.6"/>
    <circle cx="85" cy="120" r="2.5" fill="#e76f51" opacity="0.7"/>
    <circle cx="85" cy="195" r="2.5" fill="#e76f51" opacity="0.7"/>
  </g>

  <!-- Robot head -->
  <rect x="68" y="40" width="64" height="48" rx="6" fill="#4a4032" stroke="#3d3830" stroke-width="1"/>

  <!-- Duct tape patches -->
  <rect x="72" y="44" width="18" height="10" rx="2" fill="#e76f51" opacity="0.8" transform="rotate(-5, 81, 49)"/>
  <rect x="95" y="42" width="16" height="9" rx="2" fill="#f4a261" opacity="0.8" transform="rotate(3, 103, 46)"/>
  <rect x="115" y="46" width="14" height="8" rx="2" fill="#e9c46a" opacity="0.8" transform="rotate(-2, 122, 50)"/>
  <rect x="78" y="58" width="20" height="9" rx="2" fill="#264653" opacity="0.7" transform="rotate(4, 88, 62)"/>
  <rect x="102" y="60" width="16" height="8" rx="2" fill="#c1666b" opacity="0.7" transform="rotate(-3, 110, 64)"/>

  <!-- Eyes -->
  <circle cx="88" cy="66" r="4" fill="#0c0b0a"/>
  <circle cx="112" cy="66" r="4" fill="#0c0b0a"/>
  <circle cx="89" cy="65" r="1.2" fill="#ede8e0" opacity="0.6"/>
  <circle cx="113" cy="65" r="1.2" fill="#ede8e0" opacity="0.6"/>

  <!-- Mouth -->
  <line x1="92" y1="75" x2="108" y2="75" stroke="#0c0b0a" stroke-width="2" stroke-linecap="round"/>

  <!-- Left arm -->
  <g stroke="#4a4032" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="50" y1="120" x2="25" y2="140"/>
    <line x1="25" y1="140" x2="15" y2="165"/>
  </g>
  <circle cx="50" cy="120" r="5" fill="#3d3830"/>
  <circle cx="25" cy="140" r="4" fill="#3d3830"/>
  <circle cx="15" cy="165" r="6" fill="#4a4032" stroke="#e76f51" stroke-width="1" opacity="0.8"/>

  <!-- Right arm -->
  <g stroke="#4a4032" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="150" y1="120" x2="175" y2="140"/>
    <line x1="175" y1="140" x2="185" y2="165"/>
  </g>
  <circle cx="150" cy="120" r="5" fill="#3d3830"/>
  <circle cx="175" cy="140" r="4" fill="#3d3830"/>
  <circle cx="185" cy="165" r="6" fill="#4a4032" stroke="#e76f51" stroke-width="1" opacity="0.8"/>

  <!-- Tape on arms -->
  <rect x="18" y="132" width="14" height="6" rx="1.5" fill="#e76f51" opacity="0.6" transform="rotate(-30, 25, 135)"/>
  <rect x="170" y="132" width="14" height="6" rx="1.5" fill="#264653" opacity="0.6" transform="rotate(30, 177, 135)"/>
</svg>
