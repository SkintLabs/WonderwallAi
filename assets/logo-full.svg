<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" fill="none">
  <defs>
    <filter id="circuit-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="jar-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1815" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d0c0a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="jar-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="circuit-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e76f51"/>
      <stop offset="50%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#e9c46a"/>
    </linearGradient>
    <clipPath id="jar-clip">
      <rect x="150" y="85" width="100" height="120" rx="12"/>
    </clipPath>
  </defs>

  <!-- === MASCOT === -->

  <!-- Jar neck/rim -->
  <rect x="170" y="75" width="60" height="14" rx="3" fill="#2a2520" stroke="#3d3830" stroke-width="1.5"/>
  <rect x="175" y="72" width="50" height="6" rx="2" fill="#3d3830"/>

  <!-- Jar body -->
  <rect x="150" y="85" width="100" height="120" rx="12" fill="url(#jar-glass)" stroke="#2e2a25" stroke-width="1.5"/>
  <rect x="150" y="85" width="100" height="120" rx="12" fill="url(#jar-shine)"/>

  <!-- Circuit board inside jar -->
  <g clip-path="url(#jar-clip)" filter="url(#circuit-glow)">
    <line x1="200" y1="95" x2="200" y2="195" stroke="#e76f51" stroke-width="1.8" opacity="0.7"/>
    <line x1="165" y1="120" x2="235" y2="120" stroke="#f4a261" stroke-width="1.2" opacity="0.5"/>
    <line x1="170" y1="145" x2="230" y2="145" stroke="#f4a261" stroke-width="1.2" opacity="0.5"/>
    <line x1="168" y1="170" x2="232" y2="170" stroke="#f4a261" stroke-width="1.2" opacity="0.5"/>
    <line x1="175" y1="105" x2="190" y2="120" stroke="#e9c46a" stroke-width="1" opacity="0.4"/>
    <line x1="225" y1="105" x2="210" y2="120" stroke="#e9c46a" stroke-width="1" opacity="0.4"/>
    <line x1="175" y1="155" x2="185" y2="145" stroke="#e9c46a" stroke-width="1" opacity="0.4"/>
    <line x1="225" y1="155" x2="215" y2="145" stroke="#e9c46a" stroke-width="1" opacity="0.4"/>
    <line x1="180" y1="180" x2="190" y2="170" stroke="#e9c46a" stroke-width="1" opacity="0.4"/>
    <line x1="220" y1="180" x2="210" y2="170" stroke="#e9c46a" stroke-width="1" opacity="0.4"/>

    <!-- Circuit "S" shape in center -->
    <path d="M 185 110 Q 215 110, 215 125 Q 215 140, 185 140 Q 155 140, 185 155 Q 215 155, 215 170 Q 215 185, 185 185"
          stroke="#e76f51" stroke-width="2.5" fill="none" opacity="0.9" stroke-linecap="round"/>

    <!-- Circuit nodes -->
    <circle cx="200" cy="120" r="3" fill="#e76f51" opacity="0.8"/>
    <circle cx="200" cy="145" r="3" fill="#f4a261" opacity="0.8"/>
    <circle cx="200" cy="170" r="3" fill="#e76f51" opacity="0.8"/>
    <circle cx="175" cy="120" r="2" fill="#f4a261" opacity="0.6"/>
    <circle cx="225" cy="120" r="2" fill="#f4a261" opacity="0.6"/>
    <circle cx="175" cy="145" r="2" fill="#e9c46a" opacity="0.6"/>
    <circle cx="225" cy="145" r="2" fill="#e9c46a" opacity="0.6"/>
    <circle cx="175" cy="170" r="2" fill="#f4a261" opacity="0.6"/>
    <circle cx="225" cy="170" r="2" fill="#f4a261" opacity="0.6"/>
    <circle cx="185" cy="110" r="2.5" fill="#e76f51" opacity="0.7"/>
    <circle cx="185" cy="185" r="2.5" fill="#e76f51" opacity="0.7"/>
  </g>

  <!-- Robot head (duct-taped box) -->
  <rect x="168" y="30" width="64" height="48" rx="6" fill="#4a4032" stroke="#3d3830" stroke-width="1"/>

  <!-- Duct tape patches on head -->
  <rect x="172" y="34" width="18" height="10" rx="2" fill="#e76f51" opacity="0.8" transform="rotate(-5, 181, 39)"/>
  <rect x="195" y="32" width="16" height="9" rx="2" fill="#f4a261" opacity="0.8" transform="rotate(3, 203, 36)"/>
  <rect x="215" y="36" width="14" height="8" rx="2" fill="#e9c46a" opacity="0.8" transform="rotate(-2, 222, 40)"/>
  <rect x="178" y="48" width="20" height="9" rx="2" fill="#264653" opacity="0.7" transform="rotate(4, 188, 52)"/>
  <rect x="202" y="50" width="16" height="8" rx="2" fill="#c1666b" opacity="0.7" transform="rotate(-3, 210, 54)"/>

  <!-- Eyes -->
  <circle cx="188" cy="56" r="4" fill="#0c0b0a"/>
  <circle cx="212" cy="56" r="4" fill="#0c0b0a"/>
  <circle cx="189" cy="55" r="1.2" fill="#ede8e0" opacity="0.6"/>
  <circle cx="213" cy="55" r="1.2" fill="#ede8e0" opacity="0.6"/>

  <!-- Mouth -->
  <line x1="192" y1="65" x2="208" y2="65" stroke="#0c0b0a" stroke-width="2" stroke-linecap="round"/>

  <!-- Left arm -->
  <g stroke="#4a4032" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="150" y1="110" x2="125" y2="130"/>
    <line x1="125" y1="130" x2="115" y2="155"/>
  </g>
  <circle cx="150" cy="110" r="5" fill="#3d3830"/>
  <circle cx="125" cy="130" r="4" fill="#3d3830"/>
  <circle cx="115" cy="155" r="6" fill="#4a4032" stroke="#e76f51" stroke-width="1" opacity="0.8"/>

  <!-- Right arm -->
  <g stroke="#4a4032" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="250" y1="110" x2="275" y2="130"/>
    <line x1="275" y1="130" x2="285" y2="155"/>
  </g>
  <circle cx="250" cy="110" r="5" fill="#3d3830"/>
  <circle cx="275" cy="130" r="4" fill="#3d3830"/>
  <circle cx="285" cy="155" r="6" fill="#4a4032" stroke="#e76f51" stroke-width="1" opacity="0.8"/>

  <!-- Tape on arms -->
  <rect x="118" y="122" width="14" height="6" rx="1.5" fill="#e76f51" opacity="0.6" transform="rotate(-30, 125, 125)"/>
  <rect x="270" y="122" width="14" height="6" rx="1.5" fill="#264653" opacity="0.6" transform="rotate(30, 277, 125)"/>

  <!-- === WORDMARK === -->

  <!-- "S" with circuit overlay -->
  <text x="95" y="280" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="52" fill="#ede8e0" letter-spacing="-1.5">S</text>

  <!-- Circuit traces on the S letterform -->
  <g filter="url(#text-glow)" stroke="url(#circuit-grad)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M 113 240 Q 122 234, 125 238 Q 128 242, 122 248"/>
    <path d="M 122 248 L 113 252"/>
    <path d="M 113 252 Q 106 256, 108 262 Q 110 268, 118 270"/>
    <path d="M 118 270 Q 126 272, 124 278 Q 122 282, 113 280"/>
    <path d="M 125 238 L 130 236"/>
    <path d="M 108 262 L 102 260"/>
    <path d="M 118 270 L 124 266"/>
  </g>
  <g fill="#e76f51" filter="url(#text-glow)">
    <circle cx="113" cy="240" r="1.8"/>
    <circle cx="130" cy="236" r="1.3"/>
    <circle cx="122" cy="248" r="1.5"/>
    <circle cx="102" cy="260" r="1.3"/>
    <circle cx="108" cy="262" r="1.8"/>
    <circle cx="124" cy="266" r="1.3"/>
    <circle cx="113" cy="280" r="1.8"/>
  </g>

  <!-- "kint Labs" -->
  <text x="132" y="280" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="52" fill="#ede8e0" letter-spacing="-1.5">kint Labs</text>

  <!-- "Change" tagline -->
  <text x="240" y="310" font-family="Dancing Script, Pacifico, cursive" font-weight="700" font-size="28" fill="#e76f51" opacity="0.9" font-style="italic">Change</text>
</svg>
