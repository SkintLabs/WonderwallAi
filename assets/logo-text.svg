<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="circuit-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e76f51"/>
      <stop offset="50%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#e9c46a"/>
    </linearGradient>
  </defs>

  <!-- "S" letter base shape -->
  <text x="12" y="58" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="56" fill="#1a1a2e" letter-spacing="-2">S</text>

  <!-- Circuit traces overlaid on the S -->
  <g filter="url(#glow)" stroke="url(#circuit-grad)" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M 28 18 Q 38 12, 42 16 Q 46 20, 38 26"/>
    <path d="M 38 26 L 28 30"/>
    <path d="M 28 30 Q 20 34, 22 40 Q 24 46, 34 48"/>
    <path d="M 34 48 Q 42 50, 40 56 Q 38 60, 28 58"/>
    <path d="M 42 16 L 48 14"/>
    <path d="M 22 40 L 16 38"/>
    <path d="M 34 48 L 40 44"/>
  </g>

  <!-- Circuit nodes (dots at junctions) -->
  <g fill="#e76f51" filter="url(#glow)">
    <circle cx="28" cy="18" r="2"/>
    <circle cx="48" cy="14" r="1.5"/>
    <circle cx="38" cy="26" r="1.8"/>
    <circle cx="16" cy="38" r="1.5"/>
    <circle cx="22" cy="40" r="2"/>
    <circle cx="40" cy="44" r="1.5"/>
    <circle cx="28" cy="58" r="2"/>
  </g>

  <!-- "kint" -->
  <text x="50" y="58" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="56" fill="#1a1a2e" letter-spacing="-2">kint</text>

  <!-- "Labs" -->
  <text x="222" y="58" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="56" fill="#1a1a2e" letter-spacing="-2">Labs</text>
</svg>
